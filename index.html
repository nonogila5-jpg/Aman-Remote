<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizaza Salsabil - Premium Edition 🍕</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff6d00; --dark: #0a0a0a; --card: #161616; --green: #00ff88; --gold: #ffd700; --red: #ff4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .rainbow-text { font-weight: 900; font-size: 24px; background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 400% 400%; animation: rainbow-animation 5s ease infinite; }
        @keyframes rainbow-animation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .ad-glow { margin: 15px; padding: 20px; background: linear-gradient(45deg, #1a1a1a, #262626); border-radius: 25px; text-align: center; border: 2px solid var(--main); box-shadow: 0 0 15px var(--main); }
        .cat-title { margin: 25px 15px 10px; color: var(--main); font-weight: 900; border-right: 5px solid var(--main); padding-right: 12px; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: var(--card); border-radius: 20px; padding: 10px; position: relative; border: 1px solid #222; text-align: center; }
        .card img { width: 100%; height: 110px; border-radius: 15px; object-fit: cover; }
        .qty-badge { position: absolute; top: -5px; right: -5px; background: var(--green); color: #000; width: 26px; height: 26px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--dark); z-index: 10; }
        .footer-cart { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .total-price-text { color: var(--main); font-size: 22px; font-weight: 900; }
        .order-btn { background: var(--main); border: none; padding: 12px 25px; border-radius: 12px; color: #fff; font-weight: 900; font-family: 'Cairo'; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #121212; padding: 20px; border-radius: 25px; width: 100%; border: 1px solid var(--main); max-width: 400px; max-height: 80vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; box-sizing: border-box; }
        .gps-lock { color: var(--red); font-size: 12px; display: block; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <header style="padding: 15px 20px; display: flex; justify-content: center; align-items: center; background: var(--card);">
        <span class="rainbow-text">PIZAZA SALSABIL</span>
    </header>

    <div class="ad-glow">
        <h2 style="margin: 8px 0 2px; color: var(--gold); font-size: 18px;">Salsabil Pizza 🚀</h2>
        <p style="margin: 0; font-size: 13px; color: #bbb;">أفضل مذاق في وادي سلي</p>
    </div>

    <div id="categories-wrapper"></div>

    <div class="footer-cart">
        <div><small style="color:#777;">الإجمالي</small><br><span class="total-price-text" id="total-val">0</span> <small>DZD</small></div>
        <button class="order-btn" onclick="openModal('order-modal')">طلب الآن 🚀</button>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align: center; color: var(--main);">معلومات التوصيل 🚚</h3>
            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
            <select id="pay-method">
                <option value="كاش">دفع نقداً (كاش 💵)</option>
                <option value="بريدي موب">بريدي موب (BaridiMob 💳)</option>
            </select>
            <span class="gps-lock">⚠️ تنبيه: الموقع (GPS) مطلوب لإتمام الطلب.</span>
            <button id="main-order-btn" class="order-btn" style="width: 100%; margin-top: 15px;" onclick="processOrder()">تأكيد الطلب بموقعي 📍</button>
            <button onclick="closeModals()" style="width: 100%; background: none; border: none; color: #666; margin-top: 10px;">إلغاء</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://aman-audoi-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let cart = {}; let total = 0;

    // جلب المنيو من الإدارة
    db.ref('menu').on('value', snap => {
        const data = snap.val(); const wrapper = document.getElementById('categories-wrapper');
        wrapper.innerHTML = ""; if(!data) return;
        let cats = {};
        for(let id in data) { let c = data[id].category || "عام"; if(!cats[c]) cats[c] = []; cats[c].push({id, ...data[id]}); }
        for(let catName in cats) {
            let section = document.createElement('div');
            section.innerHTML = `<div class="cat-title">${catName}</div><div class="grid" id="grid-${catName}"></div>`;
            wrapper.appendChild(section);
            cats[catName].forEach(item => {
                document.getElementById(`grid-${catName}`).innerHTML += `
                    <div class="card">
                        <div class="qty-badge" id="badge-${item.id}">0</div>
                        <img src="${item.img || ''}">
                        <h4>${item.name}</h4>
                        <div style="color:var(--gold);">${item.price} DZD</div>
                        <button class="order-btn" style="width:100%; margin-top:10px;" onclick="updateQty('${item.id}', 1, ${item.price}, '${item.name}')">إضافة +</button>
                    </div>`;
            });
        }
    });

    function updateQty(id, chg, prc, nm) {
        if(!cart[id]) cart[id] = {qty:0, price:prc, name:nm};
        cart[id].qty += chg; if(cart[id].qty <= 0) delete cart[id];
        total = 0; for(let i in cart) total += (cart[i].qty * cart[i].price);
        document.getElementById('total-val').innerText = total;
        const badge = document.getElementById(`badge-${id}`);
        if(cart[id]) { badge.innerText = cart[id].qty; badge.style.display = 'flex'; } else { badge.style.display = 'none'; }
    }

    function processOrder() {
        const n = document.getElementById('cust-name').value, p = document.getElementById('cust-phone').value, m = document.getElementById('pay-method').value;
        if(!n || !p || total === 0) return alert("أكمل البيانات والطلب!");

        const btn = document.getElementById('main-order-btn');
        btn.disabled = true;
        btn.innerText = "جاري تحديد موقعك... 📍";

        // طلب الموقع بدقة عالية ومنع الإرسال بدونه
        navigator.geolocation.getCurrentPosition(
            pos => {
                const gpsLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                const orderData = { 
                    customer: n, 
                    phone: p, 
                    method: m, 
                    total: total, 
                    location: gpsLink, 
                    items: cart, 
                    time: new Date().toLocaleString() 
                };
                
                db.ref('orders').push(orderData).then(() => { 
                    alert("تم إرسال طلبك بنجاح ✅"); 
                    location.reload(); 
                });
            }, 
            err => {
                alert("❌ فشل الإرسال: يجب السماح بالوصول إلى الموقع (GPS) وتفعيله لإتمام الطلب.");
                btn.disabled = false;
                btn.innerText = "تأكيد الطلب بموقعي 📍";
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
</script>
</body>
                </html>
