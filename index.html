<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZÉRIA - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6d00; --dark: #2c3e50; --green: #27ae60; --bg: #f4f4f4; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--orange); color: white; padding: 25px 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 2px; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* الأقسام */
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: none; }
        .tab { background: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: bold; color: #888; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab.active { background: var(--orange); color: white; }

        /* البطاقة - الصورة يميناً */
        .card { 
            background: white; border-radius: 25px; padding: 12px; margin-bottom: 18px; 
            display: flex; flex-direction: row; align-items: center; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.06); height: 130px; border: 1px solid #eee;
        }

        .img-box { 
            width: 110px; height: 110px; border-radius: 20px; 
            overflow: hidden; margin-left: 18px; flex-shrink: 0; background: #eee;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; height: 100%; text-align: right; }
        .info h3 { margin: 0; font-size: 17px; color: var(--dark); font-weight: 800; }
        .price { color: var(--orange); font-weight: bold; font-size: 18px; }
        .btn-order { background: var(--green); color: white; border: none; padding: 8px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; width: fit-content; }

        /* النافذة المنبثقة */
        #orderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; backdrop-filter: blur(5px); }
        .modal-box { background: white; margin: 12% auto; padding: 25px; width: 85%; border-radius: 30px; text-align: center; }
        input { width: 100%; box-sizing: border-box; padding: 15px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 15px; font-size: 16px; font-family: 'Cairo'; }
        .gps-box { background: #fff9f5; padding: 15px; border-radius: 15px; margin: 15px 0; border: 2px dashed var(--orange); }
        #gBtn { background: var(--dark); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        .btn-confirm { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 18px; font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <header>
        <h1>🍕 PIZZÉRIA 🍕</h1>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="filterCat('all', this)">Tous</button>
            <button class="tab" onclick="filterCat('pizza', this)">Pizza</button>
            <button class="tab" onclick="filterCat('sand', this)">Sandwich</button>
            <button class="tab" onclick="filterCat('burger', this)">Burger</button>
        </div>

        <div id="menu-container"></div>

        <div id="orderModal">
            <div class="modal-box">
                <h3 id="itemName" style="color:var(--orange); margin-top:0;"></h3>
                <input type="text" id="cName" placeholder="Nom Complet">
                <input type="tel" id="cPhone" placeholder="Numéro de Téléphone">
                <div class="gps-box">
                    <button onclick="getLoc()" id="gBtn">📍 Ma Position GPS</button>
                    <p id="gStat" style="font-size:12px; margin-top:8px; color:#666;">Localisation requise</p>
                </div>
                <button class="btn-confirm" id="finalBtn" onclick="sendIt()">Confirmer ✅</button>
                <button onclick="closeGo()" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        // مصفوفة البيانات مطابقة تماماً لأسماء صورك في GitHub
        const menuData = [
            { name: "Pizza Margherita", price: "500 DZD", cat: "pizza", img: "Pizza margirita.jpeg" },
            { name: "Pizza 4 Fromages", price: "750 DZD", cat: "pizza", img: "Pidzza 4 formage.jpeg" },
            { name: "Pizza Couverte", price: "700 DZD", cat: "pizza", img: "Pizza couvert.jpeg" },
            { name: "Pizza Thon", price: "600 DZD", cat: "pizza", img: "Pizza thon .jpeg" },
            { name: "Pizza Viande Hachée", price: "650 DZD", cat: "pizza", img: "Pizza vindeache.jpeg" },
            { name: "Sandwich Poulet", price: "450 DZD", cat: "sand", img: "Sandwich poulet.jpeg" },
            { name: "Sandwich Viande", price: "550 DZD", cat: "sand", img: "Sandwich viande.jpeg" },
            { name: "Sandwich Mixte", price: "600 DZD", cat: "sand", img: "Sandwich mixte.jpeg" },
            { name: "Sandwich Shawarma", price: "500 DZD", cat: "sand", img: "Sandwich shawarma.jpeg" },
            { name: "Tacos", price: "550 DZD", cat: "sand", img: "Tacos.jpeg" },
            { name: "Burger Classique", price: "450 DZD", cat: "burger", img: "Burger.jpeg" }
        ];

        let loc = null;
        // رابط قاعدة بيانات Firebase الخاصة بك
        const dbURL = "https://aman-audoi-default-rtdb.firebaseio.com/orders.json";

        function renderMenu(filter = "all") {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            const items = filter === "all" ? menuData : menuData.filter(i => i.cat === filter);
            
            items.forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <div class="img-box"><img src="${item.img}" alt="${item.name}"></div>
                        <div class="info">
                            <div>
                                <h3>${item.name}</h3>
                                <span class="price">${item.price}</span>
                            </div>
                            <button class="btn-order" onclick="openGo('${item.name}')">Commander</button>
                        </div>
                    </div>`;
            });
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu(cat);
        }

        function openGo(n) {
            document.getElementById('orderModal').style.display = 'block';
            document.getElementById('itemName').innerText = n;
        }

        function closeGo() { document.getElementById('orderModal').style.display = 'none'; }

        function getLoc() {
            const s = document.getElementById('gStat');
            navigator.geolocation.getCurrentPosition(p => {
                loc = { lat: p.coords.latitude, lon: p.coords.longitude };
                s.innerText = "✅ Position Localisée"; s.style.color = "green";
                document.getElementById('gBtn').style.background = "#27ae60";
            }, () => { alert("Veuillez activer le GPS"); });
        }

        async function sendIt() {
            const n = document.getElementById('cName').value;
            const p = document.getElementById('cPhone').value;
            const item = document.getElementById('itemName').innerText;
            const btn = document.getElementById('finalBtn');

            if(!n || !p || !loc) { alert("Veuillez remplir les champs et localiser votre position !"); return; }

            btn.disabled = true; btn.innerText = "Envoi...";
            const order = { 
                customerName: n, 
                phone: p, 
                orderItem: item, 
                location: loc, 
                time: new Date().toLocaleString() 
            };

            try {
                const res = await fetch(dbURL, { method: 'POST', body: JSON.stringify(order) });
                if(res.ok) { alert("Succès ! Votre commande a été envoyée."); closeGo(); }
                else { alert("Erreur lors de l'envoi."); }
            } catch (e) { alert("Erreur de connexion Firebase."); }
            finally { btn.disabled = false; btn.innerText = "Confirmer ✅"; }
        }

        window.onload = () => renderMenu();
    </script>
</body>
        </html>
