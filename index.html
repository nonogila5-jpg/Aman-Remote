<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Electronics - القائمة النهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --orange: #ff6d00; --bg: #f5f5f5; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .header { background: #1a1a1a; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 15px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .tab { background: white; border: none; padding: 8px 15px; border-radius: 15px; font-weight: bold; cursor: pointer; white-space: nowrap; font-family: 'Cairo'; }
        .tab.active { background: var(--orange); color: white; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 12px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* إعدادات الصورة الصارمة */
        .img-box { width: 80px; height: 80px; border-radius: 15px; overflow: hidden; margin-left: 12px; background: #eee; flex-shrink: 0; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex: 1; text-align: right; }
        .info h3 { margin: 0; font-size: 16px; color: #333; }
        .price { color: var(--orange); font-weight: 900; font-size: 17px; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; }
        .plus { background: var(--orange); color: white; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="header"><h1>Aman Electronics</h1></div>
    <div class="tabs">
        <button class="tab active" onclick="filter('all', this)">الكل</button>
        <button class="tab" onclick="filter('pizza', this)">بيتزا</button>
        <button class="tab" onclick="filter('sand', this)">سندويش</button>
        <button class="tab" onclick="filter('burger', this)">برغر</button>
    </div>

    <div class="container" id="list"></div>

    <div class="footer">
        <div style="font-size: 22px; font-weight: 900;"><span id="total">0</span> DZD</div>
        <button onclick="order()" style="background:var(--orange); color:white; border:none; padding:12px 25px; border-radius:12px; font-family:'Cairo'; font-weight:bold;">اطلب</button>
    </div>

    <script>
        const config = { databaseURL: "https://aman-audoi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let menu = [];
        let cart = {};
        let cat = 'all';

        // دالة جلب البيانات
        db.ref('menu').on('value', s => {
            const d = s.val();
            if(d) {
                menu = Object.keys(d).map(k => ({id:k, ...d[k]}));
                render();
            }
        });

        function render() {
            const container = document.getElementById('list');
            container.innerHTML = "";
            
            menu.forEach(item => {
                if(cat !== 'all' && item.cat !== cat) return;
                const q = cart[item.id] || 0;
                
                // الرابط المباشر 100% لـ GitHub Raw
                // تأكد أن أسماء الصور في GitHub هي p1.jpg, p2.jpg...
                const imgName = item.img.includes('/') ? item.img.split('/').pop() : item.img;
                const finalImg = `https://raw.githubusercontent.com/nonogila5-jpg/Aman-Remote/main/${imgName}`;

                container.innerHTML += `
                    <div class="card">
                        <div class="img-box">
                            <img src="${finalImg}" loading="lazy" onerror="this.src='https://via.placeholder.com/80?text=Aman'">
                        </div>
                        <div class="info">
                            <h3>${item.name}</h3>
                            <span class="price">${item.price} DZD</span>
                        </div>
                        <div class="controls">
                            <button class="btn-qty plus" onclick="up('${item.id}',1)">+</button>
                            <span>${q}</span>
                            <button class="btn-qty" onclick="up('${item.id}',-1)" ${q==0?'disabled':''}>-</button>
                        </div>
                    </div>`;
            });
        }

        function up(id, v) {
            cart[id] = (cart[id] || 0) + v;
            if(cart[id] <= 0) delete cart[id];
            let t = 0;
            menu.forEach(i => { if(cart[i.id]) t += i.price * cart[i.id]; });
            document.getElementById('total').innerText = t;
            render();
        }

        function filter(c, b) {
            cat = c;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            b.classList.add('active');
            render();
        }

        function order() {
            if(Object.keys(cart).length === 0) return;
            let m = "طلب جديد:%0A";
            for(let id in cart) m += `- ${menu.find(i=>i.id==id).name} (${cart[id]})%0A`;
            window.open(`https://wa.me/213XXXXXXXXX?text=${m}`);
        }
    </script>
</body>
</html>
