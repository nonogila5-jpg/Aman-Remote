<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Delivery - إنشاء طلب</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #27ae60; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        #linkArea { display: none; background: #e8f5e9; padding: 15px; border-radius: 8px; font-size: 14px; word-break: break-all; margin-top: 15px; border: 1px dashed #27ae60; }
        .nav-links { text-align: center; margin-top: 15px; }
        .nav-links a { color: #2980b9; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center; color: #2c3e50;">Aman Delivery 📦</h2>
    <input type="tel" id="phone" placeholder="رقم المستلم (06XXXXXXXX)">
    <select id="city">
        <option value="وادي سلي">وادي سلي</option>
        <option value="الشلف">الشلف - وسط المدينة</option>
    </select>
    <input type="text" id="note" placeholder="وصف الغرض (مثلاً: ملف)">
    <button onclick="createOrder()">تأكيد وحفظ الطلب ✅</button>
    
    <div id="linkArea">
        <strong>رابط المستلم (انسخه وأرسله له):</strong><br>
        <span id="generatedLink" style="color: #27ae60; font-weight: bold;"></span>
    </div>

    <div class="nav-links">
        <a href="driver.html">🚚 لوحة تحكم السائق</a>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIza...", 
        authDomain: "aman-audoi.firebaseapp.com",
        projectId: "aman-audoi",
        databaseURL: "https://aman-audoi-default-rtdb.firebaseio.com/",
        storageBucket: "aman-audoi.appspot.com",
        messagingSenderId: "946545859812",
        appId: "1:946545859812:web:06fbd35603a1cf68b9a0f1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function createOrder() {
        const phone = document.getElementById('phone').value;
        const city = document.getElementById('city').value;
        const note = document.getElementById('note').value;
        const orderId = "AMAN_" + Date.now();

        if(phone.length < 10) { alert("الرقم غير صحيح"); return; }

        database.ref('shipments/' + orderId).set({
            phone: phone,
            city: city,
            note: note,
            status: "بانتظار الموقع",
            time: new Date().toLocaleString()
        }).then(() => {
            const currentUrl = window.location.href;
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
            const fullLink = baseUrl + "receiver.html?id=" + orderId;
            
            document.getElementById('generatedLink').innerText = fullLink;
            document.getElementById('linkArea').style.display = 'block';
            alert("تم الحفظ! انسخ الرابط الأخضر وأرسله للزبون.");
        });
    }
</script>
</body>
</html>
