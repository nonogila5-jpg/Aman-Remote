<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizaza Salsabil - Premium Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff6d00; --dark: #0a0a0a; --card: #161616; --green: #00ff88; --gold: #ffd700; --red: #ff4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* تأثير النص المتوهج */
        .rainbow-text {
            font-weight: 900; font-size: 26px;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 400% 400%; animation: rainbow-animation 5s ease infinite;
        }
        @keyframes rainbow-animation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* إعلان متوهج */
        .ad-glow {
            margin: 15px; padding: 20px;
            background: linear-gradient(45deg, #1a1a1a, #262626);
            border-radius: 25px; text-align: center;
            border: 2px solid var(--main);
            box-shadow: 0 0 20px var(--main), inset 0 0 10px var(--main);
        }
        .ad-pizza-img { width: 90px; height: 90px; object-fit: contain; animation: rotate-pizza 20s linear infinite; }
        @keyframes rotate-pizza { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* التصنيفات والشبكة */
        .cat-title { margin: 25px 15px 10px; color: var(--main); font-weight: 900; border-right: 5px solid var(--main); padding-right: 12px; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        
        .card { background: var(--card); border-radius: 22px; padding: 12px; position: relative; border: 1px solid #333; transition: 0.3s; text-align: center; }
        .card img { width: 100%; height: 115px; border-radius: 18px; object-fit: cover; }
        .card.selected { border-color: var(--green); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        /* شارات الكمية */
        .qty-badge { position: absolute; top: -10px; right: -10px; background: var(--green); color: #000; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; border: 2px solid var(--dark); z-index: 10; }

        /* سلة المشتريات الثابتة */
        .footer-cart { position: fixed; bottom: 0; width: 100%; background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(15px); padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; border-top: 1px solid #333; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .total-price-text { color: var(--main); font-size: 22px; font-weight: 900; }
        .order-btn { background: var(--main); border: none; padding: 12px 30px; border-radius: 15px; color: #fff; font-weight: 900; font-family: 'Cairo'; cursor: pointer; transition: 0.3s; }
        .order-btn:active { transform: scale(0.95); }

        /* المودالات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #151515; padding: 25px; border-radius: 30px; width: 100%; border: 2px solid var(--main); max-width: 420px; max-height: 85vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; box-sizing: border-box; font-size: 16px; }
        
        .rip-box { background: #000; padding: 15px; border: 2px dashed var(--gold); border-radius: 15px; margin: 15px 0; color: var(--gold); font-size: 16px; text-align: center; letter-spacing: 1px; font-weight: bold; }
        .upload-area { background: #222; border: 2px dashed #444; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; color: #888; margin: 10px 0; }
        
        .whatsapp-verify-btn { background: #25d366; color: white; padding: 14px; border-radius: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; font-family: 'Cairo'; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card);">
        <span class="rainbow-text">PIZAZA SALSABIL</span>
        <button onclick="openModal('comp-modal')" style="background: none; border: 1px solid #ff4444; color: #ff4444; border-radius: 10px; padding: 5px 12px; cursor: pointer; font-family: 'Cairo'; font-weight: bold;">⚠️ شكوى</button>
    </header>

    <div class="ad-glow">
        <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png" class="ad-pizza-img">
        <h2 style="margin: 10px 0 5px; color: var(--gold);">Aman Electronics Presents</h2>
        <p style="margin: 0; font-size: 14px; color: #ccc;">أفضل مذاق للبيتزا والوجبات السريعة في وادي سلي</p>
    </div>

    <div id="categories-wrapper"></div>

    <div class="footer-cart">
        <div><small style="color:#888;">المجموع الكلي</small><br><span class="total-price-text" id="total-val">0</span> <small>DZD</small></div>
        <button class="order-btn" onclick="openModal('order-modal')">إتمام الطلب 🚀</button>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align: center; color: var(--main);">تفاصيل المستلم 📦</h3>
            <input type="text" id="cust-name" placeholder="اسمك الكامل">
            <input type="tel" id="cust-phone" placeholder="رقم هاتفك">
            <select id="pay-method" onchange="toggleVerifySection()">
                <option value="كاش">الدفع عند الاستلام (كاش 💵)</option>
                <option value="بريدي موب">بريدي موب (BaridiMob 💳)</option>
            </select>

            <div id="verify-section">
                <p style="font-size: 12px; color: #aaa; text-align: center; margin-bottom: 5px;">يجب تأكيد هويتك عبر واتساب:</p>
                <div id="whatsapp-container"></div>
            </div>

            <button id="main-order-btn" class="order-btn" style="width: 100%; display: none; margin-top: 10px;" onclick="checkPaymentMethod()">متابعة الطلب ✅</button>
            <button onclick="closeModals()" style="width: 100%; background: none; border: none; color: #888; margin-top: 15px; cursor: pointer;">إلغاء</button>
        </div>
    </div>

    <div id="payment-modal" class="modal">
        <div class="modal-content" style="border-color: var(--gold);">
            <h3 style="text-align: center; color: var(--gold);">دفع عبر بريدي موب 💳</h3>
            <p style="font-size: 13px; text-align: center; margin-bottom: 10px;">حول المبلغ الإجمالي إلى الحساب التالي:</p>
            <div class="rip-box" id="dynamic-rip">جاري تحميل RIP...</div>
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                📸 انقر لرفع صورة "وصل الدفع"
                <input type="file" id="file-input" accept="image/*" hidden onchange="handleFile(this)">
            </div>
            <div id="file-status" style="font-size: 12px; text-align: center; color: var(--green); margin-bottom: 10px;"></div>
            <button class="order-btn" style="width: 100%; background: var(--gold); color: #000;" onclick="startOrderWithImage()">تأكيد وإرسال الطلب ✅</button>
            <button onclick="closeModals()" style="width: 100%; background: none; border: none; color: #888; margin-top: 10px; cursor: pointer;">رجوع</button>
        </div>
    </div>

    <div id="comp-modal" class="modal">
        <div class="modal-content" style="border-color: var(--red);">
            <h3 style="text-align: center; color: var(--red);">قسم الشكاوى ⚠️</h3>
            <input type="text" id="comp-name" placeholder="الاسم">
            <textarea id="comp-msg" placeholder="اكتب شكواك هنا..." style="height: 120px;"></textarea>
            <button class="order-btn" style="width: 100%; background: var(--red);" onclick="sendComplaint()">إرسال الآن</button>
            <button onclick="closeModals()" style="width: 100%; background: none; border: none; color: #888; margin-top: 10px; cursor: pointer;">إغلاق</button>
        </div>
    </div>

<script>
    // تهيئة Firebase
    const firebaseConfig = { databaseURL: "https://aman-audoi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = {}; let total = 0; let paymentProof = null; let authCode = ""; let myWA = "";

    // جلب إعدادات المتجر (WhatsApp & RIP)
    db.ref('settings').on('value', s => {
        const v = s.val() || {};
        myWA = v.whatsapp_number || "213661223344";
        document.getElementById('dynamic-rip').innerText = v.rip_account || "لم يتم ضبط الحساب";
    });

    // جلب وقائمة المنيو
    db.ref('menu').on('value', snap => {
        const data = snap.val();
        const wrapper = document.getElementById('categories-wrapper');
        wrapper.innerHTML = "";
        let cats = {};
        for(let id in data) {
            let item = data[id];
            let c = item.category || "أخرى";
            if(!cats[c]) cats[c] = [];
            cats[c].push({id, ...item});
        }
        for(let catName in cats) {
            let section = document.createElement('div');
            section.innerHTML = `<div class="cat-title">${catName}</div><div class="grid" id="grid-${catName}"></div>`;
            wrapper.appendChild(section);
            cats[catName].forEach(item => {
                const qty = cart[item.id]?.qty || 0;
                document.getElementById(`grid-${catName}`).innerHTML += `
                    <div class="card ${qty > 0 ? 'selected' : ''}" id="card-${item.id}">
                        <div class="qty-badge" id="badge-${item.id}" style="display:${qty > 0 ? 'flex' : 'none'}">${qty}</div>
                        <img src="${item.img || 'https://via.placeholder.com/150'}">
                        <h4 style="margin:10px 0 2px; font-size:15px;">${item.name}</h4>
                        <div style="color:var(--gold); font-weight:bold; font-size:14px;">${item.price} DZD</div>
                        <button class="order-btn" style="width:100%; margin-top:8px; padding:6px; font-size:12px; background:#222;" onclick="updateQty('${item.id}', 1, ${item.price}, '${item.name}')">إضافة +</button>
                    </div>`;
            });
        }
    });

    function updateQty(id, chg, prc, nm) {
        if(!cart[id]) cart[id] = {qty:0, price:prc, name:nm};
        cart[id].qty += chg;
        if(cart[id].qty <= 0) delete cart[id];
        
        total = 0; for(let i in cart) total += (cart[i].qty * cart[i].price);
        document.getElementById('total-val').innerText = total;

        const card = document.getElementById(`card-${id}`);
        const badge = document.getElementById(`badge-${id}`);
        if(cart[id]) {
            card.classList.add('selected');
            badge.innerText = cart[id].qty;
            badge.style.display = 'flex';
        } else {
            card.classList.remove('selected');
            badge.style.display = 'none';
        }
    }

    function toggleVerifySection() {
        const method = document.getElementById('pay-method').value;
        const section = document.getElementById('verify-section');
        const mainBtn = document.getElementById('main-order-btn');
        if(method === "كاش") {
            section.style.display = "block";
            mainBtn.style.display = "none";
            updateWhatsAppButton();
        } else {
            section.style.display = "none";
            mainBtn.style.display = "block";
        }
    }

    function updateWhatsAppButton() {
        authCode = "ACT-" + Math.floor(1000 + Math.random() * 9000);
        const container = document.getElementById('whatsapp-container');
        container.innerHTML = `<button class="whatsapp-verify-btn" onclick="sendWhatsAppAuth()">تأكيد الطلب عبر WhatsApp 🟢</button>`;
    }

    function sendWhatsAppAuth() {
        const n = document.getElementById('cust-name').value;
        const p = document.getElementById('cust-phone').value;
        if(!n || !p || total === 0) return alert("أكمل بياناتك أولاً!");
        const msg = encodeURIComponent(`مرحباً Pizaza Salsabil، أنا ${n}. أود تأكيد طلبي بكود التحقق: ${authCode}`);
        window.open(`https://wa.me/${myWA}?text=${msg}`, '_blank');
        document.getElementById('whatsapp-container').innerHTML = `
            <p style="color:var(--green); font-size:12px; margin-top:10px;">✅ تم فتح الواتساب.. اضغط أدناه لإتمام العملية:</p>
            <button class="order-btn" style="width:100%; margin-top:5px;" onclick="processOrder('كاش (موثق)', '${authCode}')">إرسال الطلب النهائي 🚀</button>`;
    }

    function openModal(id) { 
        if(id==='order-modal' && total === 0) return alert("سلتك فارغة!");
        document.getElementById(id).style.display='flex'; 
        if(id==='order-modal') toggleVerifySection(); 
    }
    
    function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
    
    function handleFile(input) { 
        const f = input.files[0]; 
        if(f){ 
            const r = new FileReader(); 
            r.onload=(e)=>{ paymentProof=e.target.result; document.getElementById('file-status').innerText="✅ تم تجهيز الوصل لإرساله"; }; 
            r.readAsDataURL(f); 
        } 
    }

    function checkPaymentMethod() { 
        if(document.getElementById('pay-method').value==="بريدي موب") { 
            closeModals(); openModal('payment-modal'); 
        } 
    }

    function startOrderWithImage() { 
        if(!paymentProof) return alert("يرجى رفع صورة وصل الدفع أولاً!"); 
        processOrder('بريدي موب', "وصل مرفق"); 
    }

    function processOrder(m, code) {
        const n = document.getElementById('cust-name').value, p = document.getElementById('cust-phone').value;
        
        navigator.geolocation.getCurrentPosition(pos => {
            const gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const orderID = Date.now();
            db.ref('orders/' + orderID).set({ 
                customer:n, phone:p, method:m, authCode:code, 
                total:total, location:gps, items:cart, 
                time:new Date().toLocaleString(),
                proof: paymentProof || "لا يوجد (كاش)"
            }).then(() => { 
                alert("تم استلام طلبك! سنتصل بك فوراً ✅"); 
                location.reload(); 
            });
        }, () => alert("يرجى تفعيل الموقع GPS لإتمام الطلب!"));
    }

    function sendComplaint() {
        const n = document.getElementById('comp-name').value;
        const m = document.getElementById('comp-msg').value;
        if(n && m) {
            db.ref('complaints/' + Date.now()).set({ name:n, msg:m, time:new Date().toLocaleString() })
            .then(() => { alert("تم استلام ملاحظتك، شكراً لك."); closeModals(); });
        } else { alert("يرجى ملء كافة الحقول!"); }
    }
</script>
</body>
    </html>
