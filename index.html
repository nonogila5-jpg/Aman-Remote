<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مطعم الأمان - زبون</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .category-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .category-btn.active {
            background: #e67e22;
            color: white;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .pizza-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .pizza-card:hover {
            transform: translateY(-5px);
        }
        .food-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f5f5f5;
        }
        .card-content {
            padding: 20px;
        }
        .pizza-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .pizza-price {
            font-size: 1.3rem;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .quantity-control button {
            background: #f0f0f0;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .quantity-control button:hover {
            background: #e67e22;
            color: white;
        }
        .quantity-control span {
            font-size: 1.3rem;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }
        .add-btn {
            width: 100%;
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .add-btn:hover {
            background: #d35400;
        }
        .cart-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .cart-section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 10px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .total-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e67e22;
            margin: 20px 0;
            text-align: left;
        }
        .input-group {
            margin: 15px 0;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #e67e22;
            outline: none;
        }
        .gps-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .payment-methods {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        .payment-methods label {
            flex: 1;
            background: #f5f5f5;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
        }
        .order-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .clear-btn {
            background: #95a5a6;
            margin-top: 10px;
        }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .debug-info {
            background: #fff3cd;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            direction: ltr;
        }
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍕 معتمد الامتياز</h1>
            <p>أطيب البيتزا والسندويشات - توصيل سريع</p>
        </div>

        <div class="debug-info" id="debugInfo">
            🔧 جاري التحقق من الصور...
        </div>

        <div class="category-tabs" id="categoryTabs">
            <button class="category-btn active" data-category="all">الكل</button>
            <button class="category-btn" data-category="pizza">🍕 بيتزا</button>
            <button class="category-btn" data-category="sandwich">🥪 سندويش</button>
            <button class="category-btn" data-category="burger">🍔 برغر</button>
        </div>

        <div class="menu-grid" id="menuGrid"></div>

        <div class="cart-section">
            <h2>🛒 سلة الطلبات</h2>
            <div id="cartItems"></div>
            <div class="total-price" id="totalPrice">المجموع: 0 دج</div>
            
            <div class="input-group">
                <input type="text" id="customerName" placeholder="الاسم الكامل" required>
            </div>
            <div class="input-group">
                <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required>
            </div>
            <button class="gps-btn" id="gpsBtn">
                <i class="fas fa-map-marker-alt"></i> تحديد الموقع عبر GPS
            </button>
            <div class="input-group">
                <input type="text" id="customerAddress" placeholder="العنوان" readonly>
            </div>

            <div class="payment-methods">
                <label>
                    <input type="radio" name="payment" value="cash" checked> 💵 كاش
                </label>
                <label>
                    <input type="radio" name="payment" value="edahabia"> 💳 بريدي موب
                </label>
            </div>

            <button class="order-btn" id="orderBtn">📦 تأكيد الطلب</button>
            <button class="order-btn clear-btn" id="clearCartBtn">🗑️ إفراغ السلة</button>
            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <script>
        // رابط GitHub الصحيح
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/nonogila5-jpg/Aman-Remote/main/";
        
        // عرض الرابط المستخدم للتصحيح
        document.getElementById('debugInfo').innerHTML = `
            🔍 رابط تحميل الصور: <strong style="direction:ltr">${GITHUB_BASE_URL}</strong><br>
            📸 إذا لم تظهر الصور، تأكد من وجود الملفات بهذه الأسماء في مستودع GitHub
        `;
        
        // ==================== قائمة الأطباق مع أسماء الصور المطابقة تماماً ====================
        const menu = [
            { 
                id: 1, 
                name: "بيتزا مارغريتا", 
                price: 650, 
                category: "pizza",
                image: "Pizza margarita.jpg",
                description: "بيتزا كلاسيكية بصلصة الطماطم والموزاريلا"
            },
            { 
                id: 2, 
                name: "بيتزا 4 فورماج", 
                price: 1100, 
                category: "pizza",
                image: "Pizzza 4 formage.jpg",
                description: "أربعة أنواع من الجبن"
            },
            { 
                id: 3, 
                name: "بيتزا كوفيرت", 
                price: 950, 
                category: "pizza",
                image: "Pizza couvert.jpg",
                description: "بيتزا مغطاة بالخضار والجبن"
            },
            { 
                id: 4, 
                name: "بيتزا تون", 
                price: 850, 
                category: "pizza",
                image: "Pizza thon.jpg",
                description: "بيتزا بالتونة والزيتون"
            },
            { 
                id: 5, 
                name: "بيتزا فينديتشي", 
                price: 900, 
                category: "pizza",
                image: "Pizza vindeache.jpg",
                description: "بيتزا حارة بالسلامي"
            },
            { 
                id: 6, 
                name: "سندويش شاورما", 
                price: 450, 
                category: "sandwich",
                image: "Sandwich shawarm....jpg",
                description: "سندويش شاورما دجاج مع صلصة الثوم"
            },
            { 
                id: 7, 
                name: "سندويش فياند", 
                price: 500, 
                category: "sandwich",
                image: "Sandwich viande.jpg",
                description: "سندويش لحم مع خضار"
            },
            { 
                id: 8, 
                name: "سندويش فياند 2", 
                price: 500, 
                category: "sandwich",
                image: "Sandwich viande2.jpg",
                description: "سندويش لحم مشوي"
            },
            { 
                id: 9, 
                name: "سندويش بوله", 
                price: 480, 
                category: "sandwich",
                image: "Sandwich poulet.jpg",
                description: "سندويش دجاج مشوي"
            },
            { 
                id: 10, 
                name: "سندويش ميكست", 
                price: 550, 
                category: "sandwich",
                image: "Sandwich mixte.jpg",
                description: "سندويش مختلط (دجاج + لحم)"
            },
            { 
                id: 11, 
                name: "تاكوس", 
                price: 600, 
                category: "sandwich",
                image: "Tacos.jpg",
                description: "تاكوس فرنسي بالدجاج"
            },
            { 
                id: 12, 
                name: "برغر", 
                price: 550, 
                category: "burger",
                image: "Burger.jpg",
                description: "برغر لحم طازج مع خضار"
            }
        ];

        let cart = [];
        let currentCategory = "all";

        function loadCart() {
            const saved = localStorage.getItem('restaurant_cart');
            if(saved) cart = JSON.parse(saved);
            renderCart();
            renderMenu();
        }

        function saveCart() {
            localStorage.setItem('restaurant_cart', JSON.stringify(cart));
        }

        function getImageUrl(imageName) {
            const encodedImage = encodeURIComponent(imageName);
            const fullUrl = `${GITHUB_BASE_URL}${encodedImage}`;
            console.log("📷 محاولة تحميل:", fullUrl);
            return fullUrl;
        }

        function testImageLoad(url, imageName) {
            const img = new Image();
            img.onload = () => console.log("✅ تم تحميل:", imageName);
            img.onerror = () => console.log("❌ فشل تحميل:", imageName, url);
            img.src = url;
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            const filteredItems = currentCategory === "all" 
                ? menu 
                : menu.filter(item => item.category === currentCategory);
            
            if(filteredItems.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:50px; background:white; border-radius:20px;">لا توجد أطباق في هذا القسم</div>';
                return;
            }
            
            grid.innerHTML = '';
            filteredItems.forEach(item => {
                const cartItem = cart.find(c => c.id === item.id);
                const qty = cartItem ? cartItem.quantity : 0;
                const imgUrl = getImageUrl(item.image);
                
                // اختبار تحميل الصورة
                testImageLoad(imgUrl, item.image);
                
                const card = document.createElement('div');
                card.className = 'pizza-card';
                card.innerHTML = `
                    <img src="${imgUrl}" 
                         alt="${item.name}" 
                         class="food-image"
                         onerror="this.src='https://via.placeholder.com/300x200?text=${encodeURIComponent(item.name)}'; this.onerror=null;">
                    <div class="card-content">
                        <div class="pizza-name">${item.name}</div>
                        <div class="pizza-price">${item.price} دج</div>
                        <div style="color:#666; font-size:0.9rem; margin-bottom:10px;">${item.description}</div>
                        <div class="quantity-control">
                            <button onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span id="qty-${item.id}">${qty}</span>
                            <button onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                        <button class="add-btn" onclick="addToCart(${item.id})">➕ أضف للسلة</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateQuantity(id, delta) {
            const existing = cart.find(c => c.id === id);
            if(existing) {
                existing.quantity += delta;
                if(existing.quantity <= 0) {
                    cart = cart.filter(c => c.id !== id);
                }
            } else if(delta > 0) {
                const item = menu.find(m => m.id === id);
                cart.push({ ...item, quantity: 1 });
            }
            saveCart();
            renderCart();
            renderMenu();
        }

        function addToCart(id) {
            updateQuantity(id, 1);
            showFeedback('✅ تم إضافة الطبق للسلة', 'success');
        }

        function renderCart() {
            const cartDiv = document.getElementById('cartItems');
            if(cart.length === 0) {
                cartDiv.innerHTML = '<p style="text-align:center; color:#999;">السلة فارغة</p>';
                document.getElementById('totalPrice').innerHTML = 'المجموع: 0 دج';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `
                    <div class="cart-item">
                        <span><strong>${item.name}</strong> x ${item.quantity}</span>
                        <span>${subtotal} دج</span>
                        <button onclick="removeItem(${item.id})" style="background:none; border:none; color:#e74c3c; cursor:pointer;">
                            <i class="fas fa-trash"></i> رجوع
                        </button>
                    </div>
                `;
            });
            cartDiv.innerHTML = html;
            document.getElementById('totalPrice').innerHTML = `المجموع: ${total} دج`;
        }

        function removeItem(id) {
            const item = cart.find(c => c.id === id);
            if(item) {
                if(item.quantity > 1) {
                    item.quantity--;
                } else {
                    cart = cart.filter(c => c.id !== id);
                }
                saveCart();
                renderCart();
                renderMenu();
                showFeedback('🗑️ تم تعديل الكمية', 'info');
            }
        }

        function showFeedback(msg, type) {
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = msg;
            feedback.style.background = type === 'success' ? '#d4edda' : '#fff3cd';
            feedback.style.color = type === 'success' ? '#155724' : '#856404';
            setTimeout(() => {
                feedback.innerHTML = '';
            }, 2000);
        }

        // الفئات
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderMenu();
            });
        });

        // GPS
        document.getElementById('gpsBtn').addEventListener('click', () => {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const addressInput = document.getElementById('customerAddress');
                        addressInput.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                        addressInput.setAttribute('data-lat', lat);
                        addressInput.setAttribute('data-lng', lng);
                        showFeedback('✅ تم تحديد موقعك بنجاح', 'success');
                    },
                    (err) => {
                        alert('خطأ في تحديد الموقع: ' + err.message);
                        document.getElementById('customerAddress').readOnly = false;
                    }
                );
            } else {
                alert('المتصفح لا يدعم تحديد الموقع');
            }
        });

        // تأكيد الطلب
        document.getElementById('orderBtn').addEventListener('click', () => {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const payment = document.querySelector('input[name="payment"]:checked').value;
            
            if(!name || !phone || !address) {
                alert('يرجى م
