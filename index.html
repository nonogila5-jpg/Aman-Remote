<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيتزا سلسبيل - اطلب الآن</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff6d00; --dark: #0a0a0a; --card: #161616; --gold: #ffd700; --white: #ffffff; --green: #2ecc71; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 0; overflow-x: hidden; }
        
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 24px; color: var(--main); }

        /* الأصناف المحدثة */
        .categories { display: flex; overflow-x: auto; gap: 10px; padding: 15px; scrollbar-width: none; background: #111; }
        .cat-btn { background: #222; color: white; border: 1px solid #333; padding: 8px 20px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; }
        .cat-btn.active { background: var(--main); border-color: var(--main); font-weight: bold; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .product-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; text-align: center; padding-bottom: 10px; }
        .product-card img { width: 100%; height: 120px; object-fit: cover; }
        .product-name { font-size: 14px; margin: 8px 0; height: 35px; overflow: hidden; font-weight: 700; }
        .product-price { color: var(--gold); font-weight: 900; margin-bottom: 10px; }
        .add-btn { background: var(--main); color: white; border: none; width: 90%; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* السلة */
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--main); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; box-shadow: 0 4px 15px rgba(255,109,0,0.3); }
        .cart-count { position: absolute; top: 0; right: 0; background: red; color: white; font-size: 12px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* نافذة الدفع والطلب */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 20px; max-width: 450px; margin: auto; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; }
        
        /* قسم بريدي موب */
        .rip-box { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px dashed var(--gold); margin: 15px 0; text-align: center; }
        .rip-number { color: var(--gold); font-weight: 900; font-size: 18px; letter-spacing: 1px; }

        .submit-btn { background: var(--green); color: #000; width: 100%; padding: 15px; border-radius: 10px; font-weight: 900; border: none; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PIZZA <span style="color:white">SALSABIL</span></div>
    </header>

    <div class="categories">
        <div class="cat-btn active" onclick="filterMenu('الكل', this)">الكل</div>
        <div class="cat-btn" onclick="filterMenu('بيتزا', this)">🍕 بيتزا</div>
        <div class="cat-btn" onclick="filterMenu('برغر', this)">🍔 برغر</div>
        <div class="cat-btn" onclick="filterMenu('سندوتش', this)">🥪 سندوتش</div>
        <div class="cat-btn" onclick="filterMenu('مملحات', this)">🥐 مملحات</div>
        <div class="cat-btn" onclick="filterMenu('مشروبات', this)">🥤 مشروبات</div>
    </div>

    <div class="menu-grid" id="menu-container"></div>

    <div class="cart-float" onclick="openCart()">🛒<div class="cart-count" id="cart-count">0</div></div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:var(--main)">مراجعة الطلب 🛒</h3>
            <div id="cart-list"></div>
            <h4 style="text-align:left;">المجموع: <span id="total-price" style="color:var(--gold)">0</span> DZD</h4>
            
            <div class="rip-box">
                <div style="font-size: 12px; margin-bottom: 5px;">💳 رقم الحساب بريدي موب (RIP):</div>
                <div class="rip-number" id="display-rip">جاري التحميل...</div>
                <div style="font-size: 10px; color: #888; margin-top: 5px;">يرجى الدفع وإرسال صورة الوصل عبر الواتساب</div>
            </div>

            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
            
            <button class="submit-btn" onclick="sendOrder()">تأكيد وإرسال الطلب (واتساب) ✅</button>
            <button onclick="closeCart()" style="background:none; border:none; color:var(--red); width:100%; margin-top:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://aman-audoi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [], fullMenu = [], waNum = "", currentRIP = "", waStatus = "on";

    // جلب الإعدادات (RIP والواتساب والحالة)
    db.ref('settings').on('value', s => {
        const v = s.val();
        waNum = v.whatsapp_number || "";
        currentRIP = v.rip_account || "غير متوفر حالياً";
        waStatus = v.wa_status || "on";
        document.getElementById('display-rip').innerText = currentRIP;
    });

    // جلب المنيو
    db.ref('menu').on('value', s => {
        fullMenu = [];
        s.forEach(child => { fullMenu.push({id: child.key, ...child.val()}); });
        renderMenu(fullMenu);
    });

    function renderMenu(items) {
        const container = document.getElementById('menu-container');
        container.innerHTML = "";
        items.forEach(item => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${item.img || 'https://via.placeholder.com/150'}">
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">${item.price} DZD</div>
                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">أضف +</button>
                </div>`;
        });
    }

    function filterMenu(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMenu(cat === 'الكل' ? fullMenu : fullMenu.filter(i => i.category === cat));
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
    }

    function openCart() {
        document.getElementById('cart-modal').style.display = 'block';
        const list = document.getElementById('cart-list');
        list.innerHTML = ""; let total = 0;
        cart.forEach(item => {
            total += item.price;
            list.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:13px; border-bottom:1px solid #222; padding:5px 0;"><span>${item.name}</span><b>${item.price} DZD</b></div>`;
        });
        document.getElementById('total-price').innerText = total;
    }

    function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

    function sendOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        if(!name || !phone || cart.length === 0) return alert("أكمل البيانات أولاً!");

        navigator.geolocation.getCurrentPosition(pos => {
            const loc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const code = Math.floor(1000 + Math.random() * 9000); // كود الواتساب (الكاش)

            const orderObj = {
                customer: name, phone: phone, 
                total: document.getElementById('total-price').innerText,
                location: loc, authCode: code, items: cart
            };

            // حفظ في القاعدة
            db.ref('orders').push(orderObj).then(() => {
                let msg = `*طلب جديد من تطبيق بيتزا سلسبيل*\n`;
                msg += `👤 الاسم: ${name}\n📱 الهاتف: ${phone}\n`;
                msg += `💰 المجموع: ${orderObj.total} DZD\n`;
                if(waStatus === "on") msg += `🔑 كود التأكيد (الكاش): ${code}\n`;
                msg += `💳 RIP للدفع: ${currentRIP}\n`;
                msg += `📍 الموقع: ${loc}\n\n*الطلبات:*\n`;
                cart.forEach(i => msg += `- ${i.name}\n`);

                window.location.href = `https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`;
            });
        }, () => alert("يرجى تفعيل الموقع (GPS) لإرسال الطلب"));
    }
</script>
</body>
    </html>
