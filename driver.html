<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السائق - Aman Levry</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #e67e22; --d: #2c3e50; --bl: #3498db; --g: #27ae60; }
        body { font-family: 'Cairo', sans-serif; background: #ecf0f1; margin: 0; padding-bottom: 80px; direction: rtl; }
        header { background: var(--bl); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top:0; z-index:1000; }
        .admin-bar { background: white; margin: 10px; padding: 10px; border-radius: 10px; display: flex; justify-content: space-around; border: 1px solid #ddd; }
        .card { background: white; margin: 15px; border-radius: 12px; padding: 15px; border-right: 5px solid var(--bl); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { display: block; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; margin-top: 8px; font-weight: bold; font-size: 14px; color: white; border:none; }
        .btn-map { background: var(--bl); } .btn-call { background: var(--g); }
        
        /* ستايل الدردشة للسائق */
        #chatBox { display:none; position:fixed; bottom:90px; left:20px; width:300px; height:400px; background:white; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.2); z-index:2000; flex-direction:column; overflow:hidden; border: 1px solid var(--bl); }
        #chatMessages { flex:1; padding:10px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; background:#f9f9f9; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 13px; }
        .msg-driver { align-self: flex-end; background: var(--bl); color: white; }
        .msg-admin { align-self: flex-start; background: #ddd; color: #333; }
        .chat-toggle { position:fixed; bottom:20px; left:20px; width:60px; height:60px; border-radius:50%; background:var(--bl); color:white; border:none; box-shadow:0 4px 10px rgba(0,0,0,0.3); font-size:24px; z-index:2000; cursor:pointer; }
    </style>
</head>
<body>

<header>🚚 مهام توصيل Aman Electronics</header>

<div class="admin-bar">
    <a href="tel:0000000000" style="text-decoration:none; color:var(--d); font-weight:bold;">📞 اتصل بالمدير</a>
    <span style="color:#ccc;">|</span>
    <a href="https://wa.me/0000000000" style="text-decoration:none; color:var(--g); font-weight:bold;">💬 واتساب</a>
</div>

<div id="driver-tasks"></div>

<div id="chatBox">
    <div style="background:var(--bl); color:white; padding:10px; text-align:center;"><b>الدردشة مع المدير</b></div>
    <div id="chatMessages"></div>
    <div style="padding:10px; display:flex; gap:5px; border-top:1px solid #eee;">
        <input type="text" id="msgInput" placeholder="اكتب رسالة..." style="flex:1; border:1px solid #ddd; border-radius:20px; padding:8px 15px; outline:none;">
        <button onclick="sendMsg()" style="background:var(--bl); color:white; border:none; border-radius:50%; width:35px; height:35px;">⬅️</button>
    </div>
</div>
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<script>
    const dbURL = "https://aman-audoi-default-rtdb.firebaseio.com/orders.json";
    const chatURL = "https://aman-audoi-default-rtdb.firebaseio.com/chat.json";

    async function loadTasks() {
        const res = await fetch(dbURL);
        const data = await res.json();
        const container = document.getElementById('driver-tasks');
        container.innerHTML = "";
        if(!data) { container.innerHTML = "<p style='text-align:center; color:#999; margin-top:20px;'>لا توجد طلبيات</p>"; return; }
        Object.keys(data).forEach(id => {
            const o = data[id];
            const mapURL = `https://www.google.com/maps?q=${o.location.lat},${o.location.lon}`;
            container.innerHTML += `
                <div class="card">
                    <b>👤 ${o.customerName}</b>
                    <p>🍴 الوجبة: <b>${o.orderItem}</b></p>
                    <a href="${mapURL}" class="btn btn-map" target="_blank">🗺️ فتح الخريطة (GPS)</a>
                    <a href="tel:${o.phone}" class="btn btn-call">📞 اتصال بالزبون</a>
                </div>`;
        });
    }

    // وظائف الدردشة للسائق
    function toggleChat() { 
        const b = document.getElementById('chatBox'); 
        b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; 
        if(b.style.display === 'flex') loadMsgs();
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        if(!input.value) return;
        const msg = { sender: 'السائق', text: input.value, time: new Date().toLocaleTimeString() };
        await fetch(chatURL, { method: 'POST', body: JSON.stringify(msg) });
        input.value = ""; loadMsgs();
    }

    async function loadMsgs() {
        const res = await fetch(chatURL);
        const data = await res.json();
        const container = document.getElementById('chatMessages');
        container.innerHTML = "";
        if(data) {
            Object.values(data).forEach(m => {
                const isMe = m.sender === 'السائق';
                container.innerHTML += `<div class="msg ${isMe ? 'msg-driver' : 'msg-admin'}">${m.text}</div>`;
            });
            container.scrollTop = container.scrollHeight;
        }
    }

    loadTasks(); loadMsgs();
    setInterval(loadTasks, 15000); setInterval(loadMsgs, 3000);
</script>
</body>
</html>
