<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsabil Driver Pro - Aman Electronics</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff6d00; --dark: #0a0a0a; --card: #161616; --messenger: #0084ff; --green: #2ecc71; --red: #ff4757; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; direction: rtl; overflow-x: hidden; }

        /* قوس المطر الاحترافي */
        .rainbow-text {
            font-weight: 900; background: linear-gradient(to right, #ff2400, #e8b21d, #1de840, #1ddde8, #2b1de8, #dd00f3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 400%;
            animation: rainbow 8s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0%; } 100% { background-position: 400%; } }

        /* واجهة الدخول */
        #login-section { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .login-card { background: var(--card); padding: 40px 20px; border-radius: 30px; border: 1px solid #333; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        input { width: 100%; padding: 15px; margin: 12px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-family: 'Cairo'; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(255,109,0,0.3); }
        .btn-login { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--main); color: #000; font-weight: 900; cursor: pointer; font-size: 17px; margin-top: 10px; }

        /* واجهة المهام الاحترافية */
        #tasks-section { display: none; padding-bottom: 80px; }
        header { background: rgba(22, 22, 22, 0.9); backdrop-filter: blur(10px); sticky; top: 0; z-index: 100; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .driver-info { display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 12px; height: 12px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); }

        .stats-bar { display: flex; justify-content: space-around; padding: 20px 10px; background: #111; margin: 10px; border-radius: 20px; border: 1px solid #222; }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 12px; color: #888; }
        .stat-item b { font-size: 20px; color: var(--main); }

        .order-card { background: var(--card); border-radius: 25px; padding: 20px; margin: 15px; border: 1px solid #333; position: relative; transition: 0.3s; }
        .order-card:active { transform: scale(0.98); }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .cust-name { font-size: 18px; font-weight: 900; color: #fff; }
        .order-price { background: rgba(46, 204, 113, 0.2); color: var(--green); padding: 5px 12px; border-radius: 10px; font-weight: bold; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-call { background: #333; color: #fff; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 12px; font-weight: bold; }
        .btn-gps { background: var(--main); color: #000; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 12px; font-weight: bold; }
        .btn-done { width: 100%; margin-top: 10px; background: var(--green); color: #fff; border: none; padding: 14px; border-radius: 15px; font-weight: 900; cursor: pointer; font-family: 'Cairo'; font-size: 16px; }

        /* الدردشة */
        .messenger-fab { position: fixed; bottom: 20px; left: 20px; width: 65px; height: 65px; background: var(--messenger); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; z-index: 1000; box-shadow: 0 10px 20px rgba(0,132,255,0.4); }
        .chat-window { display: none; position: fixed; bottom: 95px; left: 20px; width: 300px; height: 420px; background: var(--card); border: 2px solid var(--messenger); border-radius: 25px; flex-direction: column; z-index: 999; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #000; }
        .msg { margin-bottom: 12px; max-width: 80%; padding: 10px; border-radius: 15px; font-size: 13px; }
        .msg.admin { background: #333; align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg.me { background: var(--messenger); align-self: flex-end; border-bottom-left-radius: 2px; margin-right: auto; }

        .loader { display: none; width: 30px; height: 30px; border: 4px solid var(--main); border-bottom-color: transparent; border-radius: 50%; margin: 10px auto; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <h1 class="rainbow-text">AMAN DRIVER</h1>
            <p style="color:#888; font-size:12px;">نظام إدارة التوصيل الذكي</p>
            <input type="text" id="user-input" placeholder="اسم المستخدم">
            <input type="password" id="pass-input" placeholder="كلمة السر">
            <div id="loader" class="loader"></div>
            <button class="btn-login" onclick="login()">دخول 🛵</button>
            <p id="error-msg" style="color:var(--red); font-size:12px; display:none; margin-top:15px;"></p>
        </div>
    </div>

    <div id="tasks-section">
        <header>
            <div class="driver-info">
                <div class="status-dot"></div>
                <span id="driver-display" style="font-weight:900;">...</span>
            </div>
            <div class="rainbow-text" style="font-size:14px;">Pizza Salsabil</div>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span id="order-count">0</span>
                <b>الطلبات</b>
            </div>
            <div class="stat-item">
                <span>الحالة</span>
                <b style="font-size:14px; color:var(--green)">متصل</b>
            </div>
        </div>

        <div id="orders-list">
            <div class="loader" style="display:block;"></div>
        </div>

        <div class="messenger-fab" onclick="toggleChat()">
            <i class="fab fa-facebook-messenger"></i>
        </div>
        <div id="chat-window" class="chat-window">
            <div style="background:var(--messenger); padding:15px; text-align:center; font-weight:bold;">مركز الرسائل</div>
            <div class="chat-messages" id="chat-box" style="display:flex; flex-direction:column;"></div>
            <div style="padding:10px; background:#1a1a1a; display:flex; gap:10px;">
                <input type="text" id="msg-input" placeholder="اكتب هنا..." style="margin:0; padding:10px; border-radius:10px;">
                <button onclick="sendMsg()" style="background:var(--messenger); border:none; color:white; padding:10px; border-radius:10px; width:50px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://aman-audoi-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = () => {
        const saved = localStorage.getItem('currentDriver');
        if(saved) { showTasks(saved); }
    };

    function login() {
        const user = document.getElementById('user-input').value.trim().toLowerCase();
        const pass = document.getElementById('pass-input').value;
        const loader = document.getElementById('loader');
        const err = document.getElementById('error-msg');

        if(!user || !pass) return;
        loader.style.display = "block";

        db.ref('drivers/' + user).once('value', snap => {
            loader.style.display = "none";
            if(snap.exists() && snap.val().password === pass) {
                const name = snap.val().name || user;
                localStorage.setItem('currentDriver', name);
                showTasks(name);
            } else {
                err.innerText = "بيانات الدخول غير صحيحة!";
                err.style.display = "block";
            }
        });
    }

    function showTasks(name) {
        document.getElementById('login-section').style.display = "none";
        document.getElementById('tasks-section').style.display = "block";
        document.getElementById('driver-display').innerText = name;
        loadOrders();
        loadChat(name);
    }

    function loadOrders() {
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('orders-list');
            const countDisp = document.getElementById('order-count');
            list.innerHTML = "";
            const data = snap.val();
            
            if(!data) { 
                list.innerHTML = "<p style='text-align:center; color:#555; margin-top:50px;'>لا توجد طلبات نشطة حالياً</p>"; 
                countDisp.innerText = "0";
                return; 
            }

            const keys = Object.keys(data);
            countDisp.innerText = keys.length;

            keys.forEach(id => {
                const o = data[id];
                list.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="cust-name">${o.customer}</div>
                                <div style="font-size:12px; color:#888;">📦 طلب جديد</div>
                            </div>
                            <div class="order-price">${o.total} DZD</div>
                        </div>
                        <div class="action-btns">
                            <a href="tel:${o.phone}" class="btn-call"><i class="fas fa-phone"></i> اتصال</a>
                            <a href="${o.location}" target="_blank" class="btn-gps"><i class="fas fa-location-arrow"></i> الموقع</a>
                        </div>
                        <button onclick="finishOrder('${id}')" class="btn-done">تم التوصيل واستلام المبلغ ✅</button>
                    </div>`;
            });
        });
    }

    function finishOrder(id) {
        if(confirm("هل أنت متأكد من إتمام العملية؟")) {
            db.ref('orders/' + id).remove();
        }
    }

    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    function loadChat(driverName) {
        db.ref('delivery_chat').limitToLast(20).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const type = (m.user === "الإدارة") ? "admin" : "me";
                box.innerHTML += `<div class="msg ${type}"><b>${m.user}:</b><br>${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const txt = document.getElementById('msg-input').value;
        const driverName = localStorage.getItem('currentDriver');
        if(txt) {
            db.ref('delivery_chat').push({ user: driverName, text: txt });
            document.getElementById('msg-input').value = "";
        }
    }
</script>
</body>
    </html>
