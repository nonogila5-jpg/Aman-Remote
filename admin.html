<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة Aman Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #e67e22; --d: #2c3e50; --g: #27ae60; --r: #e74c3c; --bl: #3498db; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 80px; }
        header { background: var(--d); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .order-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-right: 6px solid var(--p); position: relative; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; color: white; display: inline-block; font-size: 13px; }
        .btn-call { background: var(--g); } .btn-map { background: var(--d); } .btn-done { background: var(--r); width: 100%; margin-top: 10px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .time-badge { font-size: 11px; color: #888; display: block; margin-top: 5px; }
        
        /* واجهة البدء لفتح قناة الصوت */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--d); color: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #start-btn { background: var(--p); color: white; border: none; padding: 18px 35px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="start-overlay">
    <div style="font-size: 60px; margin-bottom: 10px;">🔔</div>
    <h2 style="margin: 0 0 10px 0;">نظام إدارة Aman</h2>
    <p style="padding: 0 20px;">اضغط لتفعيل استقبال الطلبات وجرس التنبيه</p>
    <button id="start-btn" onclick="startSystem()">تشغيل النظام الآن</button>
</div>

<header>
    <div style="font-size: 18px; font-weight: bold;">📦 إدارة Aman Electronics</div>
</header>

<audio id="notifSound" src="alert.mp3" preload="auto"></audio>

<div class="container">
    <div id="orders-list"></div>
</div>

<script>
    const dbURL = "https://aman-audoi-default-rtdb.firebaseio.com/orders.json";
    let lastDataString = ""; 
    let isFirstRun = true;

    function startSystem() {
        document.getElementById('start-overlay').style.display = 'none';
        const audio = document.getElementById('notifSound');
        // تفعيل الصوت برمجياً عبر تشغيل وإيقاف سريع
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e => console.log("Audio ready"));
        
        updateOrders();
        setInterval(updateOrders, 4000); // تحديث كل 4 ثوانٍ
    }

    async function updateOrders() {
        try {
            const response = await fetch(dbURL);
            const data = await response.json();
            
            // تحويل البيانات الحالية لنص للمقارنة مع الحالة السابقة
            const currentDataString = JSON.stringify(data);

            // إذا لم يتغير شيء، اخرج فوراً (هذا يمنع الرمشة)
            if (currentDataString === lastDataString) return;

            const container = document.getElementById('orders-list');
            
            if (!data) {
                container.innerHTML = "<p style='text-align:center; margin-top:20px;'>لا توجد طلبات حالياً</p>";
                lastDataString = currentDataString;
                return;
            }

            // إذا كان هناك طلب جديد (زيادة في عدد العناصر) وليس المرة الأولى التي يفتح فيها التطبيق
            const currentCount = Object.keys(data).length;
            const lastCount = lastDataString && lastDataString !== "null" ? Object.keys(JSON.parse(lastDataString)).length : 0;

            if (currentCount > lastCount && !isFirstRun) {
                document.getElementById('notifSound').play().catch(err => console.log("خطأ في تشغيل الصوت"));
            }

            // بناء الواجهة فقط عند التغيير الحقيقي
            container.innerHTML = "";
            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                const maps = `https://www.google.com/maps?q=${o.location.lat},${o.location.lon}`;
                container.innerHTML += `
                    <div class="order-card">
                        <b style="font-size:16px;">👤 ${o.customerName}</b>
                        <p style="margin:8px 0;">🍕 الطلب: <span style="color:var(--p); font-weight:bold;">${o.orderItem}</span></p>
                        <span class="time-badge">⏰ ${o.time || 'منذ قليل'}</span>
                        <div class="actions">
                            <a href="tel:${o.phone}" class="btn btn-call">اتصال بالزبون</a>
                            <a href="${maps}" target="_blank" class="btn btn-map">فتح الموقع📍</a>
                        </div>
                        <button class="btn btn-done" onclick="completeOrder('${id}')">تم التوصيل (حذف من القائمة) ✅</button>
                    </div>`;
            });

            lastDataString = currentDataString;
            isFirstRun = false;

        } catch (error) {
            console.error("Firebase connection error");
        }
    }

    async function completeOrder(id) {
        if(confirm("هل تريد تأكيد حذف هذا الطلب؟")) {
            await fetch(`https://aman-audoi-default-rtdb.firebaseio.com/orders/${id}.json`, { method: 'DELETE' });
            updateOrders();
        }
    }
</script>
</body>
</html>
