<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة Aman Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #e67e22; --d: #2c3e50; --g: #27ae60; --r: #e74c3c; --bl: #3498db; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 80px; }
        header { background: var(--d); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .order-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-right: 6px solid var(--p); }
        .btn { padding: 12px; border: none; border-radius: 10px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; display: inline-block; font-size: 13px; text-align: center; text-decoration: none; }
        .btn-call { background: var(--g); } .btn-map { background: var(--d); } .btn-done { background: var(--r); width: 100%; margin-top: 10px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        
        /* حل مشكلة الرمش: شاشة البدء ضرورية لمرة واحدة فقط */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--d); color: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { background: var(--p); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="start-screen">
    <h2>تفعيل نظام التنبيهات 🔔</h2>
    <button id="start-btn" onclick="initAdmin()">دخول لوحة التحكم</button>
</div>

<header>
    <div style="font-size: 18px; font-weight: bold;">📦 إدارة Aman Electronics</div>
</header>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<div class="container">
    <div id="orders-list"></div>
</div>

<script>
    const dbURL = "https://aman-audoi-default-rtdb.firebaseio.com/orders";
    let lastOrderCount = 0;
    let isInitialLoad = true;

    function initAdmin() {
        document.getElementById('start-screen').style.display = 'none';
        const audio = document.getElementById('alertSound');
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }); // تفعيل الصوت
        loadOrders();
        setInterval(loadOrders, 5000); // تحديث كل 5 ثوانٍ
    }

    async function loadOrders() {
        try {
            const res = await fetch(dbURL + ".json");
            const data = await res.json();
            const container = document.getElementById('orders-list');
            
            if (!data) {
                container.innerHTML = "<p style='text-align:center;'>لا توجد طلبات حالياً</p>";
                lastOrderCount = 0;
                return;
            }

            const currentKeys = Object.keys(data);
            const currentCount = currentKeys.length;

            // تنبيه صوتي عند وجود طلب جديد فقط
            if (currentCount > lastOrderCount && !isInitialLoad) {
                document.getElementById('alertSound').play().catch(e => console.log("الصوت يحتاج تفاعل"));
            }

            // تحديث الواجهة فقط إذا تغير عدد الطلبات (لحذف الرمشة)
            if (currentCount !== lastOrderCount || isInitialLoad) {
                container.innerHTML = "";
                currentKeys.reverse().forEach(id => {
                    const o = data[id];
                    const mapURL = `https://www.google.com/maps?q=${o.location.lat},${o.location.lon}`;
                    container.innerHTML += `
                        <div class="order-card">
                            <b>👤 ${o.customerName}</b>
                            <p>🍕 الطلب: <span style="color:var(--p)">${o.orderItem}</span></p>
                            <div class="actions">
                                <a href="tel:${o.phone}" class="btn btn-call">اتصال</a>
                                <a href="${mapURL}" target="_blank" class="btn btn-map">الموقع</a>
                            </div>
                            <button class="btn btn-done" onclick="deleteOrder('${id}')">تم التوصيل (حذف) ✅</button>
                        </div>`;
                });
            }

            lastOrderCount = currentCount;
            isInitialLoad = false;
        } catch (e) { console.error("خطأ في الاتصال"); }
    }

    async function deleteOrder(id) {
        if(confirm("هل تم التوصيل؟")) {
            await fetch(`${dbURL}/${id}.json`, { method: 'DELETE' });
            loadOrders();
        }
    }
</script>
</body>
</html>
